<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Tool — ZyncTools</title>
    <meta name="description" content="Privacy-first utility tool. 100% client-side. No uploads.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%236366F1'>⚡</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        slate: { 950: '#0F1115', 900: '#13151A', 850: '#1C1F26', 800: '#23262F', 700: '#2D313A' },
                        accent: { DEFAULT: '#6366F1', light: '#818CF8', dark: '#4F46E5' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script>
        (function() {
            var theme = localStorage.getItem('zync-theme');
            if (theme === 'light' || theme === 'dark') {
                document.documentElement.setAttribute('data-theme', theme);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <script src="assets/js/theme.js" defer></script>
</head>
<body>

    <!-- Header -->
    <header class="border-b border-white/5 bg-[#0B0C10]">
        <div class="mx-auto max-w-7xl px-6 h-14 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3 group">
                <div class="w-8 h-8 rounded-lg bg-accent/10 border border-accent/20 flex items-center justify-center text-accent font-bold text-lg group-hover:bg-accent/20 transition-colors">⚡</div>
                <span class="text-lg font-bold tracking-tight text-white">ZyncTools</span>
            </a>
            <nav class="hidden md:flex items-center gap-8">
                <a href="/" class="text-sm text-gray-400 hover:text-white transition-colors">All Tools</a>
                <button id="theme-toggle" class="text-sm text-gray-400 hover:text-white transition-colors" aria-label="Toggle theme">
                    <i data-lucide="moon" class="w-4 h-4"></i>
                </button>
            </nav>
        </div>
    </header>

    <main class="py-10">
        <div class="mx-auto max-w-7xl px-6">
            <!-- Tool Header -->
            <div class="mb-8">
                <div class="flex items-center gap-4 mb-2">
                    <div class="w-12 h-12 rounded-xl bg-accent/10 border border-accent/20 flex items-center justify-center text-accent text-xl">
                        <i id="tool-icon" data-lucide="tool"></i>
                    </div>
                    <div>
                        <h1 id="tool-title" class="text-2xl md:text-3xl font-bold text-white tracking-tight">Tool Name</h1>
                        <p id="tool-description" class="text-gray-400 mt-1">Tool description goes here.</p>
                    </div>
                </div>
            </div>

            <!-- Dynamic Tool Interface -->
            <div id="tool-interface">
                <!-- Dynamically rendered based on tool.type -->
            </div>
        </div>
    </main>

    <footer class="border-t border-white/5 py-8">
        <div class="mx-auto max-w-7xl px-6 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 rounded bg-accent/10 border border-accent/20 flex items-center justify-center text-accent text-xs font-bold">⚡</div>
                <span class="text-sm font-semibold text-white">ZyncTools</span>
            </div>
            <p class="text-xs text-gray-500">100% client-side. No uploads. No tracking.</p>
        </div>
    </footer>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="assets/js/registry-loader.js"></script>
    <script src="assets/js/tool-registry.js"></script>
    <script src="assets/js/tool-viewer.js"></script>
</body>
</html>
