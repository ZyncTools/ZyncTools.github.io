<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ZyncPDF - Professional PDF Workspace. Edit, annotate, merge, split, compress PDFs entirely in your browser. 100% private, open source, no uploads.">
  <meta name="keywords" content="PDF editor, PDF annotator, merge PDF, split PDF, compress PDF, PDF text editor, privacy-first PDF">
  <meta name="author" content="ZyncPDF Team">
  <meta name="theme-color" content="#4f46e5" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <meta property="og:type" content="website">
  <meta property="og:title" content="ZyncPDF - Professional PDF Workspace">
  <meta property="og:description" content="Professional PDF editing in your browser. 100% private, no uploads, completely free.">
  <meta property="og:image" content="/logo.png">
  <meta property="og:url" content="https://zyncpdf.github.io/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ZyncPDF - Professional PDF Workspace">
  <meta name="twitter:description" content="Professional PDF editing in your browser. 100% private, no uploads, completely free.">
  <meta name="twitter:image" content="/logo.png">
  <link rel="canonical" href="https://zyncpdf.github.io/">
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="/src/styles/design-system.css">
  <title>ZyncPDF - Professional PDF Workspace</title>
  
  <script type="module">
    // Performance timing
    window.performance?.mark?.('zyncpdf:start');
    
    // Load PDF.js worker early
    window.pdfjsLib = window.pdfjsLib || {};
    window.pdfjsLib.GlobalWorkerOptions = window.pdfjsLib.GlobalWorkerOptions || {};
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = '/vendor/pdfjs/pdf.worker.min.mjs';
  </script>
</head>
<body>
  <div class="animated-bg" aria-hidden="true"></div>
  
  <noscript>
    <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; background: var(--bg-primary); color: var(--text-primary);">
      <div style="max-width: 400px;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin: 0 auto 1.5rem; opacity: 0.5;">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="9" y1="3" x2="9" y2="21"></line>
          <line x1="15" y1="3" x2="15" y2="21"></line>
        </svg>
        <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">JavaScript Required</h1>
        <p style="color: var(--text-secondary);">ZyncPDF requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
      </div>
    </noscript>

  <div id="app"></div>

  <script type="module" src="/src/main.ts"></script>
  
  <script>
    // Performance monitoring
    window.addEventListener('load', () => {
      window.performance?.mark?.('zyncpdf:load');
      window.performance?.measure?.('zyncpdf:init', 'zyncpdf:start', 'zyncpdf:load');
      
      // Log performance
      const measure = performance.getEntriesByName('zyncpdf:init')[0];
      if (measure) {
        console.log(`[ZyncPDF] Initialized in ${measure.duration.toFixed(2)}ms`);
      }
    });

    // Global error handler
    window.addEventListener('error', (e) => {
      console.error('[ZyncPDF] Global error:', e.error);
    });

    window.addEventListener('unhandledrejection', (e) => {
      console.error('[ZyncPDF] Unhandled rejection:', e.reason);
      e.preventDefault();
    });

    // Visibility change for auto-save
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden' && window.ZyncPDF?.app?.documents) {
        window.ZyncPDF.app.documents.autoSaveAll();
      }
    });

    // Keyboard shortcuts help
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === '/') {
        e.preventDefault();
        window.ZyncPDF?.app?.commands?.open?.();
      }
    });
  </script>
</body>
</html>
